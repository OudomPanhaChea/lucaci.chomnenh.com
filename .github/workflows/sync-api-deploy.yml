name: Sync api-deploy branch

# Hostinger deploys the API app from the api-deploy branch. hPanel cannot use
# a repo subdirectory as the app root AND it permanently caches "client" as
# this repo's root directory from its first scan, so the branch is generated
# with the server app nested under client/ to match: root directory "client"
# then points at the Express app. Regenerated on every server change on main.

on:
  push:
    branches: [main]
    paths:
      - "server/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split server/ into api-deploy (nested under client/) and push
        run: |
          # commit-tree refuses to run without an ident on the runner
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SPLIT=$(git subtree split --prefix=server HEAD)
          TREE=$(printf '040000 tree %s\tclient\n' "$(git rev-parse "$SPLIT^{tree}")" | git mktree)
          COMMIT=$(git commit-tree "$TREE" -p "$SPLIT" -m "api-deploy: server app nested under client/ (hPanel locks root directory to client)")
          git push -f origin "$COMMIT:refs/heads/api-deploy"
