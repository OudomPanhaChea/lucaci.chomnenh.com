<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#304a59" />
    <title>Reconnecting · Chomnenh POS</title>
    <style>
      /* Self-contained on purpose: this page renders with no network, so it
         cannot pull the app's CSS or self-hosted fonts. Tokens mirror
         globals.css. */
      :root {
        --surface: #f4f6f8;
        --surface-raised: #ffffff;
        --fg: #142332;
        --fg-muted: #52677a;
        --line: #dde4e9;
        --brand: #304a59;
        --brand-hover: #263c49;
        --accent: #ffa040;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --surface: #0c1520;
          --surface-raised: #142332;
          --fg: #e4ecf2;
          --fg-muted: #9db0c0;
          --line: #23374a;
          --brand: #4e7288;
          --brand-hover: #5d849b;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(1.5rem + env(safe-area-inset-top)) calc(1.5rem + env(safe-area-inset-right))
          calc(1.5rem + env(safe-area-inset-bottom)) calc(1.5rem + env(safe-area-inset-left));
        background: var(--surface);
        color: var(--fg);
        font-family: "Fira Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 26rem;
        background: var(--surface-raised);
        border: 1px solid var(--line);
        border-radius: 1rem;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 1px 3px 0 rgb(20 35 50 / 0.07);
      }
      img { width: 2.75rem; height: 2.75rem; border-radius: 0.625rem; }
      h1 { margin: 1.25rem 0 0; font-size: 1.25rem; line-height: 1.4; }
      p { margin: 0.625rem 0 0; color: var(--fg-muted); font-size: 0.9375rem; line-height: 1.6; }
      button {
        margin-top: 1.5rem;
        width: 100%;
        min-height: 44px; /* touch target */
        border: 0;
        border-radius: 0.5rem;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 200ms;
      }
      button:hover { background: var(--brand-hover); }
      button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .hint { margin-top: 1rem; font-size: 0.8125rem; color: var(--fg-muted); }
      .dot {
        display: inline-block;
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 999px;
        background: var(--accent);
        margin-right: 0.375rem;
        vertical-align: baseline;
      }
      @media (prefers-reduced-motion: no-preference) {
        .dot { animation: pulse 1.6s ease-in-out infinite; }
      }
      @keyframes pulse { 50% { opacity: 0.25; } }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/images/chomnenh-mark.png" alt="Chomnenh" />
      <h1>Reconnecting</h1>
      <p>
        Chomnenh POS could not reach the server. This is usually the Wi-Fi
        dropping or the server waking up, and it normally clears in a few
        seconds. Nothing you have already saved is lost.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint"><span class="dot"></span><span id="status">Checking the connection…</span></p>
    </main>
    <script>
      // This page is shown for two different faults that look the same to staff:
      // the network is gone, or the server is not answering yet (shared-hosting
      // cold start, redeploy). The "online" event only ever fires for the first
      // one, so it cannot be the only trigger: after a cold start the tablet was
      // never offline and nothing would fire, leaving staff stuck here.
      // So poll the real thing instead. /api/health is proxied by the web app to
      // the API, meaning a 200 proves BOTH are up, which is exactly the
      // condition for a reload to actually succeed.
      (function () {
        var status = document.getElementById("status");
        var attempt = 0;
        var stopped = false;

        function probe() {
          if (stopped) return;
          attempt++;
          var controller = new AbortController();
          var timer = setTimeout(function () {
            controller.abort();
          }, 5000);

          fetch("/api/health?probe=" + Date.now(), {
            cache: "no-store",
            signal: controller.signal,
          })
            .then(function (res) {
              if (!res.ok) throw new Error("not ready");
              stopped = true;
              status.textContent = "Back online, reloading…";
              location.reload();
            })
            .catch(function () {
              status.textContent = "Still trying… (attempt " + attempt + ")";
              // Back off so a long outage does not hammer the server or drain
              // the tablet battery, but stay responsive for the common blip.
              setTimeout(probe, Math.min(2000 * attempt, 15000));
            })
            .finally(function () {
              clearTimeout(timer);
            });
        }

        probe();
        // Wi-Fi coming back is a strong hint to probe again right now rather
        // than waiting out the current backoff.
        addEventListener("online", function () {
          attempt = 0;
          probe();
        });
      })();
    </script>
  </body>
</html>
